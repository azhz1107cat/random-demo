<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"/>
    <meta name="author" content="Zhz">
    <title>随机点名器</title>

    <link rel="stylesheet" href="styles/styles.css">
    <script src="script/jQuery/jquery-3.7.1.min.js"></script>
    <script src="script/epWindow/epWindow-1.0.0.js"></script>

</head>

<body>
    <div class="header">
        <span class="header-text">
            Random2025
        </span>
    </div>
    
    <div class="put-result">
        <div class="put-result-header">
            <div class="put-result-title">
                <span class="put-result-head-text">抽取结果 显示在这里</span>
            </div>
            <div class="put-result-operate-area">
                <button class="btn-to-copy-result" disabled>
                    <img src="styles/FontAwesome/copy-solid.svg" width="32" height="32"/>
                </button>
    
                <button class="btn-to-save-result" disabled>
                    <img src="styles/FontAwesome/file-export-solid.svg" width="32" height="32"/>
                </button>
    
                <button class="btn-to-change-view" disabled>
                    <img src="styles/FontAwesome/grip-solid.svg" width="32" height="32"/>
                </button>
            </div>
        </div>

        <div class="put-result-main">
            
        </div>

    </div>
    
    <div class="operate-area">
        <img class="black-svg-img" src="styles/FontAwesome/address-book-solid.svg"  width="32" height="32"/>
        <span>
        现有
        <span class="num-to-catch">
            0
        </span>
        个待抽取对象
        </span>
        
        <div class="left-btns">
            
        <button class="open-setting operate-button">
             <img src="styles/FontAwesome/gear-solid.svg" width="32" height="32"/>
        </button>
        
        <button class="open-inputs operate-button">
            <img src="styles/FontAwesome/bars-solid.svg" width="32" height="32"/>
        </button>
        
        </div>
    </div>

    
    <div class="footer">
        <button class="start operate-button">
            <img src="styles/FontAwesome/play-solid.svg" width="32" height="32"/>
        </button>
    </div>
    

    <div class="window-bg setting-window">
        <div class="window-body">
            <div class="window-head">
                <span class="window-title">设置</span>
                <button class="window-close window-right-close-btn">
                    <img src="styles/FontAwesome/xmark-solid.svg" width="32" height="32"/>
                </button>
            </div><br/>
            
            <div class="window-maincontent">
                
                <div>
                    <span>抽取组数</span><input type="number" class="get-group-to-call" value="1">
                </div>
                
                <div>
                    <span>每组抽取数量</span><input type="number" class="get-number-to-call">
                </div>
                
                <div>
                    <span><label for="canRepeat">可重复</label></span><input type="checkbox" id="canRepeat">
                </div>
                
                <div>
                    <span><label for="useSafe">使用更加安全的方法</label></span><input type="checkbox" id="useSafe">
                </div>

                <div>
                    <span><label for="not-useAnime">无动画</label></span><input type="radio" id="not-useAnime" checked>
                </div>

                <div>
                    <span><label for="useAnime-rh">跑马灯式动画</label></span><input type="radio" id="useAnime-rh">
                </div>

                <div>
                    <span><label for="useAnime-box">抽签盒式动画</label></span><input type="radio" id="useAnime-box">
                </div>

                <div>
                    <span><label for="useAnime-tt">大转盘式动画</label></span><input type="radio" id="useAnime-tt">
                </div>

                <div>
                    <span><label for="autoSavePeopleList">自动保存待抽取人列表</label></span><input type="checkbox" id="autoSavePeopleList">
                </div>
                
            </div>
            
            <div class="window-footer">
                <button class="make-settings-from-storage">
                    <img src="styles/FontAwesome/database-solid.svg" width="32" height="32"/>使用上次的设置储存
                </button>
                
                <button  class="window-enter">
                    <img src="styles/FontAwesome/check-solid.svg" width="32" height="32"/>确定
                </button>
                
                <button class="window-close">
                    <img src="styles/FontAwesome/xmark-solid.svg" width="32" height="32"/>取消
                </button>
            </div>
        </div>
    </div>
    


    
    <div class="window-bg inputs-window">
        <div class="window-body">
            <div class="window-head">
                <span class="window-title">人员</span>
                <button class="window-close window-right-close-btn">
                    <img src="styles/FontAwesome/xmark-solid.svg" width="32" height="32"/>
                </button>
            </div><br/>
            
            <div class="window-maincontent">
                
                <label for="fileInput">
                    <button class="make-inputs-from-file-onload">
                        <img src="styles/FontAwesome/file-import-solid.svg" width="32" height="32"/>从文件添加
                    </button>
                </label>
                <input type="file" id="fileInput" style="display: none;">
                
                <button class="make-inputs-from-text">
                    <img src="styles/FontAwesome/pen-to-square-solid.svg" width="32" height="32"/>从文本添加
                </button>
                
                <button class="make-inputs-from-storage">
                    <img src="styles/FontAwesome/database-solid.svg"  width="32" height="32"/>从上次的储存添加
                </button>
                    
                <button class="make-new-input">
                    <img src="styles/FontAwesome/user-plus-solid.svg" width="32" height="32"/>添加新人
                </button>

                <button class="clean-all-inputs">
                    <img src="styles/FontAwesome/trash-solid.svg" width="32" height="32"/>清除
                </button>

                

                <div class="show-inputs"></div>
                
            </div>
            
            <div class="window-footer">

                <button  class="window-enter">
                    <img src="styles/FontAwesome/check-solid.svg" width="32" height="32"/>确定
                </button>
                
                <button class="window-close">
                    <img src="styles/FontAwesome/xmark-solid.svg" width="32" height="32"/>取消
                </button>
            </div>
        </div>
    </div>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script/main_script.js"></script>
    <noscript><b>您的浏览器不支持Javascript</b></noscript>

</body>

</html>
